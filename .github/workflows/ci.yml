name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.2.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild -project CmdV.xcodeproj -scheme CmdV -configuration Debug \
            -destination 'platform=macOS,arch=arm64' -derivedDataPath build build

      - name: Test
        run: |
          xcodebuild -project CmdV.xcodeproj -scheme CmdV \
            -destination 'platform=macOS,arch=arm64' -derivedDataPath build test
